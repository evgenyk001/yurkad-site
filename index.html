<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЮрКад — юридические услуги в Артёме</title>
    <meta name="description" content="Юридическая компания ЮрКад в Артёме. Профессиональная защита в судах">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ШАПКА С ИКОНКАМИ -->
    <header class="header">
        <div class="container header-container">
            
            <!-- Лого слева (теперь ОЧЕНЬ КРУПНОЕ) -->
            <div class="logo-wrapper">
                <img src="assets/logo.png" alt="ЮрКад" class="logo">
            </div>

            <!-- Навигация иконками -->
            <nav class="nav-icons">
                
                <a href="#services" class="nav-icon-item">
                    <div class="nav-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9E937E" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                    </div>
                    <span class="nav-label">Услуги</span>
                </a>

                <a href="#about" class="nav-icon-item">
                    <div class="nav-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9E937E" stroke-width="2">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M5 20v-2a7 7 0 0 1 14 0v2"/>
                        </svg>
                    </div>
                    <span class="nav-label">О нас</span>
                </a>

                <a href="#contacts" class="nav-icon-item">
                    <div class="nav-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9E937E" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="2.5"/>
                            <path d="M7 7h10M7 12h10M7 17h6"/>
                        </svg>
                    </div>
                    <span class="nav-label">Контакты</span>
                </a>

            </nav>
        </div>
    </header>

    <!-- ПЕРВЫЙ ЭКРАН С ФЕМИДОЙ -->
    <section class="hero">
        <div class="container hero-grid">
            
            <!-- Левая часть с текстом (ВСЁ СЛЕВА, НИЧЕГО НЕ ПРЫГАЕТ) -->
            <div class="hero-content">
                <!-- Контейнер с фиксированной высотой -->
                <div class="hero-words-wrapper">
                    <span class="hero-word" id="changing-word">Надёжная</span>
                </div>
                <!-- Эти элементы НИКОГДА не двигаются -->
                <h1 class="hero-title">юридическая защита</h1>
                <p class="hero-subtitle">в Артёме и Приморском крае</p>
                <a href="#contacts" class="btn">Получить консультацию</a>
            </div>

            <!-- Правая часть с Фемидой -->
            <div class="hero-image">
                <div class="femida-wrapper">
                    <svg width="420" height="420" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g stroke="#9E937E" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="256" cy="90" r="40"/>
                            <path d="M256 130 C210 210, 210 300, 256 360 C302 300, 302 210, 256 130Z"/>
                            <line x1="256" y1="160" x2="160" y2="240"/>
                            <line x1="256" y1="160" x2="352" y2="240"/>
                            <line x1="160" y1="240" x2="160" y2="180"/>
                            <path d="M120 240 L160 320 L200 240"/>
                            <line x1="352" y1="240" x2="352" y2="180"/>
                            <path d="M312 240 L352 320 L392 240"/>
                            <line x1="256" y1="360" x2="256" y2="460"/>
                            <path d="M236 460 L276 460"/>
                        </g>
                    </svg>
                </div>
            </div>

        </div>
    </section>

    <!-- ДАЛЬШЕ ТВОИ СЕКЦИИ (УСЛУГИ, О КОМПАНИИ, КОНТАКТЫ) -->
    <!-- ВСТАВЛЯЙ ИХ СЮДА -->

    <script src="js/script.js"></script>
</body>
</html>
